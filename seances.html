<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Séances & Horaires | Les Studios</title>
  <link rel="stylesheet" href="css/styles.css">
</head>
<body>
  <!-- Insert Standard Navbar Here -->

  <section class="container" style="padding-top: 8rem; min-height: 80vh;">
    <h1 class="section-title">Séances du moment</h1>

    <!-- Day Filters -->
    <div class="date-filters">
      <div class="date-btn active">Aujourd'hui</div>
      <div class="date-btn">Demain</div>
      <div class="date-btn">Mercredi 14</div>
      <div class="date-btn">Jeudi 15</div>
      <div class="date-btn">Vendredi 16</div>
    </div>

    <!-- Timetable UI -->
    <div class="schedule-row">
      <img src="https://images.unsplash.com/photo-1626814026160-2237a95fc5a0?q=80&w=200&auto=format&fit=crop" class="schedule-poster" alt="Dune">
      <div class="schedule-info">
        <h3>Dune: Part Two</h3>
        <p style="color: var(--text-muted); font-size: 0.9rem;">Salle 1 • Sci-Fi • 2h46</p>
        <div class="times-grid">
          <div class="time-pill">14:00 (VOSTFR)</div>
          <div class="time-pill">17:15 (VF)</div>
          <div class="time-pill">20:30 (VOSTFR)</div>
        </div>
      </div>
    </div>

    <div class="schedule-row">
      <img src="https://images.unsplash.com/photo-1534447677768-be436bb09401?q=80&w=200&auto=format&fit=crop" class="schedule-poster" alt="Pauvres Creatures">
      <div class="schedule-info">
        <h3>Pauvres Créatures</h3>
        <p style="color: var(--text-muted); font-size: 0.9rem;">Salle 2 • Comédie dramatique • 2h21</p>
        <div class="times-grid">
          <div class="time-pill">18:15 (VOSTFR)</div>
          <div class="time-pill">21:00 (VOSTFR)</div>
        </div>
      </div>
    </div>
  </section>

  <!-- Insert Standard Footer Here -->
  <script src="js/main.js"></script>
  <script src="js/booking.js"></script>
</body>
</html>
